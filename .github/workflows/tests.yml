name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pytest

      - name: Install draw.io CLI
        run: |
          curl -fsSL https://github.com/jgraph/drawio-desktop/releases/download/v26.0.9/drawio-amd64-26.0.9.deb -o drawio.deb
          sudo apt-get update
          sudo apt-get install -y xvfb ./drawio.deb
          # drawio needs a display; create a wrapper that uses xvfb-run
          sudo mv /usr/bin/drawio /usr/bin/drawio-real
          printf '#!/bin/sh\nexec xvfb-run -a /usr/bin/drawio-real --no-sandbox "$@"\n' | sudo tee /usr/bin/drawio > /dev/null
          sudo chmod +x /usr/bin/drawio

      - name: Run tests
        run: python -m pytest tools/azdisc/tests/ -v --tb=short

      - name: Generate all layout × mode combinations (test-all)
        run: python -m tools.azdisc -v test-all -o out/test-all

      - name: Upload test-all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-diagrams-all-combinations
          path: out/test-all/

      - name: Post combination summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const root = 'out/test-all';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            // Walk fixture/combo directories and collect stats
            const rows = [];
            for (const fixture of fs.readdirSync(root).sort()) {
              const fixtureDir = path.join(root, fixture);
              if (!fs.statSync(fixtureDir).isDirectory()) continue;
              for (const combo of fs.readdirSync(fixtureDir).sort()) {
                const comboDir = path.join(fixtureDir, combo);
                if (!fs.statSync(comboDir).isDirectory()) continue;
                let nodes = '?', edges = '?';
                try {
                  const g = JSON.parse(fs.readFileSync(path.join(comboDir, 'graph.json'), 'utf8'));
                  nodes = g.nodes.length;
                  edges = g.edges.length;
                } catch (e) {}
                const hasPng = fs.existsSync(path.join(comboDir, 'diagram.png'));
                rows.push(`| \`${fixture}\` | \`${combo}\` | ${nodes} | ${edges} | ${hasPng ? 'yes' : 'no'} |`);
              }
            }

            const body = [
              '## Integration Test — all layout × mode combinations',
              '',
              `Generated at ${sha} from all fixture files × all layouts × all diagram modes.`,
              '',
              `[**Download test-diagrams-all-combinations artifact**](${runUrl})`,
              '',
              '| Fixture | Combination | Nodes | Edges | PNG |',
              '|---------|-------------|------:|------:|-----|',
              ...rows,
            ].join('\n');

            const marker = '## Integration Test — all layout × mode combinations';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }