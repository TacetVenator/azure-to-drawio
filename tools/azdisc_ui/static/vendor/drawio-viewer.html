<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>draw.io Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
    }
    #viewerFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #0f172a;
      visibility: hidden;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cbd5e1;
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1e293b 0%, #0f172a 50%, #020617 100%);
      z-index: 1;
      pointer-events: none;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div id="loading">Opening diagrams.net embed session...</div>
  <iframe
    id="viewerFrame"
    title="Embedded diagrams.net viewer"
    referrerpolicy="strict-origin-when-cross-origin">
  </iframe>
  <script>
    (function loadViewerBridge() {
      var bridgeState = {
        childReady: false,
        queuedPayload: null,
        renderTimer: null,
        bootTimer: null
      };
      var viewerFrame = document.getElementById('viewerFrame');
      var remoteViewerUrl = 'https://viewer.diagrams.net/?embed=1&ui=min&spin=1&proto=json';

      function updateLoading(message, isError) {
        var loading = document.getElementById('loading');
        if (!loading) {
          return;
        }
        loading.textContent = String(message || '');
        loading.style.color = isError ? '#fecaca' : '#cbd5e1';
      }

      function postToParent(eventName, extras) {
        var payload = Object.assign({
          source: 'diagram-beta-viewer',
          event: eventName
        }, extras || {});
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(JSON.stringify(payload), '*');
        }
      }

      function parsePayload(rawPayload) {
        if (typeof rawPayload === 'string') {
          try {
            return JSON.parse(rawPayload);
          } catch {
            return null;
          }
        }
        return rawPayload && typeof rawPayload === 'object' ? rawPayload : null;
      }

      function sendToChild(payload) {
        if (!payload || !viewerFrame || !viewerFrame.contentWindow) {
          return;
        }
        viewerFrame.contentWindow.postMessage(JSON.stringify(payload), '*');
      }

      function flushQueuedPayload() {
        if (!bridgeState.childReady || !bridgeState.queuedPayload) {
          return;
        }
        var payload = bridgeState.queuedPayload;
        bridgeState.queuedPayload = null;
        updateLoading('Rendering ' + String(payload.name || 'diagram.drawio') + '...', false);
        sendToChild(payload);
        if (bridgeState.renderTimer) {
          window.clearTimeout(bridgeState.renderTimer);
        }
        bridgeState.renderTimer = window.setTimeout(function () {
          updateLoading('Embedded viewer rendered ' + String(payload.name || 'diagram.drawio') + '.', false);
          postToParent('rendered', { name: String(payload.name || 'diagram.drawio') });
        }, 450);
      }

      viewerFrame.addEventListener('load', function () {
        updateLoading('Embedded frame loaded. Negotiating diagrams.net session...', false);
        sendToChild({ action: 'ping' });
      });

      window.addEventListener('message', function (event) {
        var payload = parsePayload(event.data);
        if (event.source === viewerFrame.contentWindow) {
          if (!payload || typeof payload !== 'object') {
            return;
          }
          var childEvent = String(payload.event || '').toLowerCase();
          if (childEvent === 'configure') {
            sendToChild({ action: 'configure' });
            return;
          }
          if (childEvent === 'init' || childEvent === 'ready') {
            bridgeState.childReady = true;
            viewerFrame.style.visibility = 'visible';
            updateLoading('Embedded viewer ready.', false);
            postToParent('ready');
            flushQueuedPayload();
            return;
          }
          postToParent(childEvent || 'message', payload);
          return;
        }

        if (!payload || typeof payload !== 'object') {
          return;
        }
        if (payload.action === 'ping') {
          postToParent(bridgeState.childReady ? 'ready' : 'booting');
          if (!bridgeState.childReady) {
            sendToChild({ action: 'ping' });
          }
          return;
        }
        if (payload.action === 'load') {
          bridgeState.queuedPayload = payload;
          updateLoading('Embedded viewer booting. Diagram queued for render...', false);
          postToParent('queued');
          flushQueuedPayload();
        }
      });

      updateLoading('Opening diagrams.net embed session...', false);
      postToParent('booting');
      viewerFrame.src = remoteViewerUrl;

      bridgeState.bootTimer = window.setTimeout(function () {
        if (!bridgeState.childReady) {
          updateLoading('Timed out waiting for diagrams.net embed session.', true);
          postToParent('error', { message: 'Timed out waiting for diagrams.net embed session.' });
        }
      }, 20000);
    }());
  </script>
</body>
</html>
